<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Go On A Date With Me? ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:linear-gradient(135deg,#ff4e88,#ff7eb3,#ffc3a0);
background-size:400% 400%;
animation:bg 12s ease infinite;

}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{

width:420px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(18px);
border-radius:25px;
padding:35px;
text-align:center;
color:white;
box-shadow:0 10px 40px rgba(0,0,0,.25);

}

h1{

font-size:32px;
margin-bottom:10px;

}

.subtitle{
margin-bottom:25px;
font-size:15px;
}

input,select{

width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:15px;

}

textarea{

width:100%;
height:80px;
padding:12px;
border:none;
border-radius:12px;
resize:none;
margin-top:10px;

}

.buttons{

margin-top:25px;
display:flex;
justify-content:center;
gap:20px;
position:relative;

}

button{

padding:14px 30px;
font-size:18px;
border:none;
border-radius:40px;
cursor:pointer;
transition:.3s;

}

#yes{

background:#ff2d55;
color:white;

}

#yes:hover{

transform:scale(1.1);

}

#no{

background:white;
color:#ff2d55;
position:relative;

}

#success{

display:none;
font-size:24px;
margin-top:20px;
animation:pop .6s;

}

@keyframes pop{

0%{transform:scale(0);}
100%{transform:scale(1);}

}

/* Floating Hearts */

.heart{

position:absolute;
bottom:-50px;
font-size:22px;
animation:float 8s linear infinite;
opacity:.8;

}

@keyframes float{

0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}

20%{
opacity:1;
}

100%{

transform:translateY(-110vh) rotate(360deg);
opacity:0;

}

}

</style>
</head>

<body>

<div class="container">

<h1>❤️ Date Invitation ❤️</h1>

<p class="subtitle">
I'd love to spend a beautiful day with you.
Will you be my date?
</p>

<input type="date">

<select>
<option>Select Time</option>
<option>Lunch - 1:00 PM</option>
<option>Coffee - 4:00 PM</option>
<option>Dinner - 7:30 PM</option>
<option>Night Walk - 9:00 PM</option>
</select>

<select>

<option>Choose Your Favorite Food</option>

<option>🍕 Pizza</option>
<option>🍝 Italian</option>
<option>🍣 Sushi</option>
<option>🍛 Indian</option>
<option>🍔 Burgers</option>
<option>🥩 BBQ</option>
<option>🍰 Desserts</option>

</select>

<textarea placeholder="Leave me a little message..."></textarea>

<div class="buttons">

<button id="yes">YES ❤️</button>

<button id="no">NO 😅</button>

</div>

<div id="success">
🎉 Yay!! I can't wait to see you! ❤️🌹
</div>

</div>

<!-- Optional Music -->
<!--
<audio autoplay loop>
<source src="romantic.mp3" type="audio/mpeg">
</audio>
-->

<script>

const yes=document.getElementById("yes");
const no=document.getElementById("no");
const success=document.getElementById("success");

yes.onclick=function(){

success.style.display="block";

createConfetti();

}

no.addEventListener("mouseover",()=>{

const x=Math.random()*300-150;
const y=Math.random()*200-100;

no.style.transform=`translate(${x}px,${y}px)`;

});

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*25)+"px";

heart.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},9000);

}

setInterval(createHeart,400);

function createConfetti(){

for(let i=0;i<100;i++){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=["❤️","🌹","💖","💕","✨"][Math.floor(Math.random()*5)];

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(2+Math.random()*2)+"s";

document.body.appendChild(heart);

}

}

</script>

</body>
</html>
